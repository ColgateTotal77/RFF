<script>
  window.addEventListener('load', function() {
    var targetChapterIndex = $targetChapterIndex;
    var scrollPosition = $scrollPosition;

    var targetChapter = document.getElementById('chapter-' + targetChapterIndex);

    if (targetChapter) {
      targetChapter.scrollIntoView({ behavior: 'auto', block: 'start' });
    } else {
      window.scrollTo(0, parseInt(scrollPosition) || 0);
    }

    requestAnimationFrame(function() {
      setTimeout(function() {
        if (window.ReactNativeWebView) {
          window.ReactNativeWebView.postMessage(JSON.stringify({
            type: 'INITIAL_LOAD_COMPLETE',
          }));
        }
      }, 50);
    });
  });
</script>
