<style>
  mark.search-highlight { background-color: #fff59d; color: #000; }
</style>

<script>
  window.highlightAll = function(searchQuery, currentBlocks) {
    if (!searchQuery || window._lastSearchQuery === searchQuery && window._lastSearchBlocks === currentBlocks.join(',')) return;
    window.log('highlightAll: searching for "' + searchQuery + '" in blocks [' + currentBlocks.join(',') + ']');

    var escapedWord = searchQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    var flexiblePattern = escapedWord.replace(/\s+/g, '\\s*');
    var regex = new RegExp("(" + flexiblePattern + ")", 'gi');

    currentBlocks.forEach(function(blockIdx) {
      var blockContainer = document.getElementById('block-' + blockIdx);
      if (!blockContainer) {
        window.log('highlightAll: block-' + blockIdx + ' not found', 'error');
        return;
      }

      var walker = document.createTreeWalker(blockContainer, NodeFilter.SHOW_TEXT, null, false);
      var node;
      var textNodes = [];

      while (node = walker.nextNode()) {
        if (!['SCRIPT', 'STYLE'].includes(node.parentNode.nodeName)) {
          textNodes.push(node);
        }
      }

      var localOccurrenceIndex = 0;

      var textParts = [];
      var nodeStartIndex = 0;
      textNodes.forEach(function(textNode) {
        textParts.push({
          node: textNode,
          start: nodeStartIndex,
          end: nodeStartIndex + textNode.nodeValue.length,
          text: textNode.nodeValue
        });
        nodeStartIndex += textNode.nodeValue.length;
      });

      var fullText = textParts.map(function(p) { return p.text; }).join('');

      regex.lastIndex = 0;
      var match;
      var processedNodes = new Set();

      while ((match = regex.exec(fullText)) !== null) {
        var matchStart = match.index;
        var matchEnd = match.index + match[0].length;

        var affectedNodes = [];
        for (var i = 0; i < textParts.length; i++) {
          var part = textParts[i];
          if (part.end > matchStart && part.start < matchEnd) {
            affectedNodes.push(part);
          }
        }

        if (affectedNodes.length === 0) continue;

        affectedNodes.forEach(function(part) {
          if (processedNodes.has(part.node)) return;
          processedNodes.add(part.node);

          if (part.node.parentNode.classList.contains('search-highlight')) {
            return;
          }

          var nodeMatchStart = Math.max(matchStart - part.start, 0);
          var nodeMatchEnd = Math.min(matchEnd - part.start, part.text.length);

          var fragment = document.createDocumentFragment();
          if (nodeMatchStart > 0) {
            fragment.appendChild(document.createTextNode(part.text.substring(0, nodeMatchStart)));
          }

          var mark = document.createElement('mark');
          mark.className = 'search-highlight';
          mark.id = 'search-match-' + blockIdx + '-' + localOccurrenceIndex;
          mark.textContent = part.text.substring(nodeMatchStart, nodeMatchEnd);
          fragment.appendChild(mark);

          if (nodeMatchEnd < part.text.length) {
            fragment.appendChild(document.createTextNode(part.text.substring(nodeMatchEnd)));
          }

          part.node.parentNode.replaceChild(fragment, part.node);
        });

        localOccurrenceIndex++;
      }
      if (localOccurrenceIndex > 0) {
        window.log('highlightAll: block-' + blockIdx + ' has ' + localOccurrenceIndex + ' matches');
      }
    });

    window._lastSearchQuery = searchQuery;
    window._lastSearchBlocks = currentBlocks.join(',');
    window.ReactNativeWebView.postMessage(JSON.stringify({ type: 'SEARCH_HIGHLIGHT_COMPLETE' }));
  };

  window.jumpToSearch = function(blockId, occurrenceIndex) {
    window.log('jumpToSearch: jumping to block ' + blockId + ', occurrence ' + occurrenceIndex);
    document.querySelectorAll('mark.active-match').forEach(function(el) {
      el.classList.remove('active-match');
    });

    var targetId = 'search-match-' + blockId + '-' + occurrenceIndex;
    var target = document.getElementById(targetId);

    if (target) {
      target.classList.add('active-match');
      target.scrollIntoView({ behavior: 'smooth', block: 'center' });
    } else {
      window.log('jumpToSearch: target not found (search-match-' + blockId + '-' + occurrenceIndex + ')', 'error');
    }
  };

  window.clearSearch = function() {
    var marks = document.querySelectorAll('mark.search-highlight');
    window.log('clearSearch: removing ' + marks.length + ' highlights');
    marks.forEach(function(mark) {
      var parent = mark.parentNode;
      parent.replaceChild(document.createTextNode(mark.textContent), mark);
      parent.normalize();
    });
  };
</script>
