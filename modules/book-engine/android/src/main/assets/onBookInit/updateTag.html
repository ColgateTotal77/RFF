<script>
  window.updateTag = function(words, noteId, colorCode) {
    const wordArray = Array.isArray(words) ? words : [words];

    window.log('updateTag: started for "' + (wordArray.join(', ') || noteId) + '"');

    if (!words || (Array.isArray(words) && words.length === 0)) {
      const existingSpans = document.querySelectorAll('span.anki-word[data-note-id="' + noteId + '"]');
      existingSpans.forEach(function(span) {
        span.setAttribute('data-flag', colorCode);
      });
      return;
    }

    const targetWords = new Set(wordArray.map(w => w.toLowerCase().trim()).filter(w => w));
    const existingSpans = document.querySelectorAll('span.anki-word');
    existingSpans.forEach(function(span) {
      const spanText = span.textContent.trim().toLowerCase();
      if (targetWords.has(spanText)) {
        span.setAttribute('data-flag', colorCode);
      }
    });

    const escapedWords = wordArray
      .filter(w => w && w.trim())
      .map(w => w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));

    if (escapedWords.length === 0) return;

    const combinedRegex = new RegExp('\\b(' + escapedWords.join('|') + ')\\b', 'gi');

    const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, null, false);
    const textNodes = [];
    let node;

    while ((node = walker.nextNode())) {
      const parent = node.parentNode;
      if (
        node.nodeValue.trim() !== '' &&
        !['SCRIPT', 'STYLE'].includes(parent.nodeName) &&
        (!parent.classList || !parent.classList.contains('anki-word'))
      ) {
        textNodes.push(node);
      }
    }

    const nodesToProcess = textNodes.length;
    if (nodesToProcess > 0) window.log('updateTag: processing ' + nodesToProcess + ' nodes for ' + escapedWords.length + ' words');
    else window.log('updateTag: no nodes to process', 'error');

    textNodes.forEach(function(textNode) {
      const safeText = textNode.nodeValue
        .replace(/&/g, '&​amp;')
        .replace(/</g, '&​lt;')
        .replace(/>/g, '&​gt;');

      const newHtml = safeText.replace(combinedRegex, function(match) {
        return '<span class="anki-word" data-note-id="' + noteId + '" data-flag="' + colorCode + '">' + match + '</span>';
      });

      if (newHtml !== safeText) {
        const wrapper = document.createElement('span');
        wrapper.innerHTML = newHtml;
        textNode.parentNode.replaceChild(wrapper, textNode);

        wrapper.outerHTML = wrapper.innerHTML;
      }
    });
    window.log('updateTag: completed');
  };
</script>
