<script>
  document.addEventListener("DOMContentLoaded", () => {
    const config = window.BookConfig || {};

    const currentFont = config.fontFamily || "sans-serif";
    const currentFontSize = config.fontSize || 16;

    document.documentElement.style.setProperty('--book-font-family', currentFont);
    document.documentElement.style.setProperty('--book-font-size', `${currentFontSize}px`);
  });

  document.addEventListener('contextmenu', (event) => {
    event.preventDefault();
  });

  window.setFontSize = (size) => {
    document.body.style.fontSize = size + 'px';
  };
  window.setFontFamily = (family) => {
    document.body.style.fontFamily = family;
  };

  window.isFetching = false;

  let scrollTimeout;
  let lastScrollY = 0;
  window.addEventListener('scroll', () => {
    if (window.isFetching) return;

    const scrollY = window.scrollY;
    const bottomY = scrollY + window.innerHeight;
    const documentHeight = document.documentElement.scrollHeight;
    const chapters = document.querySelectorAll('div[id^="chapter-"]');

    if (chapters.length === 0) return;
    if (documentHeight <= window.innerHeight) return;

    const firstChapterHeight = chapters[0].offsetHeight;
    const lastChapterHeight = chapters[chapters.length - 1].offsetHeight;

    if (scrollY < (firstChapterHeight * 0.45) ) {
      window.isFetching = true;
      window.ReactNativeWebView.postMessage('TOP_REACHED');
    }
    if (bottomY > (documentHeight - (lastChapterHeight * 0.45))) {
      window.isFetching = true;
      window.ReactNativeWebView.postMessage('END_REACHED');
    }

    clearTimeout(scrollTimeout);
    scrollTimeout = setTimeout(() => {
      if (Math.abs(scrollY - lastScrollY) > 100) {
        window.ReactNativeWebView.postMessage(JSON.stringify({
          type: 'SCROLL_POSITION_CHANGED',
          scrollY: scrollY,
        }));
        lastScrollY = scrollY;
      }
    }, 300);
  });

  document.addEventListener('selectionchange', () => {
    const selection = window.getSelection();
    const selectedText = selection.toString().trim();

    if (selectedText.length > 0) {
      const range = selection.getRangeAt(0);
      const rect = range.getBoundingClientRect();

      let noteId = null;
      let colorCode = null;

      const commonAncestor = range.commonAncestorContainer;
      const highlightedElement = commonAncestor.nodeType === Node.TEXT_NODE
        ? commonAncestor.parentElement
        : commonAncestor;

      if (highlightedElement && highlightedElement.classList.contains('anki-word')) {
        noteId = highlightedElement.getAttribute('data-note-id');
        colorCode = highlightedElement.getAttribute('data-flag');
      }

      window.ReactNativeWebView.postMessage(JSON.stringify({
        type: 'TEXT_SELECTED',
        text: selectedText,
        top: rect.top,
        left: rect.left + (rect.width / 2),
        noteId: noteId ? noteId : null,
        colorCode: colorCode ? colorCode : null
      }));
    } else {
      window.ReactNativeWebView.postMessage(JSON.stringify({
        type: 'SELECTION_CLEARED'
      }));
    }
  });

  let tapCount = 0;
  let tapTimer = null;
  let lastTapText = '';
  const TAP_DELAY = 200;

  document.addEventListener('touchend', (event) => {
    const range = document.caretRangeFromPoint(event.changedTouches[0].clientX, event.changedTouches[0].clientY);
    let selectedText = '';
    let noteId = null;
    let colorCode = null;

    if (range && range.startContainer.nodeType === Node.TEXT_NODE) {
      const text = range.startContainer.textContent;
      const offset = range.startOffset;

      const commonAncestor = range.commonAncestorContainer;
      const highlightedElement = commonAncestor.nodeType === Node.TEXT_NODE
        ? commonAncestor.parentElement
        : commonAncestor;

      if (highlightedElement && highlightedElement.classList.contains('anki-word')) {
        noteId = highlightedElement.getAttribute('data-note-id');
        colorCode = highlightedElement.getAttribute('data-flag');
      }

      const start = text.lastIndexOf(' ', offset - 1) + 1;
      const end = text.indexOf(' ', offset);
      selectedText = text.substring(start, end === -1 ? text.length : end).trim();
    }

    if (!selectedText) return;

      if (tapTimer) {
        clearTimeout(tapTimer);
      }

      tapCount++;

      if (selectedText !== lastTapText) {
        tapCount = 1;
        lastTapText = selectedText;
      }

      if (tapCount === 1) {
        tapTimer = setTimeout(() => {
          if (tapCount === 1) {
          }
          tapCount = 0;
        }, TAP_DELAY);
      } else if (tapCount === 2) {
        tapTimer = setTimeout(() => {
          tapCount = 0;
          window.ReactNativeWebView.postMessage(JSON.stringify({
            type: 'DOUBLE_TAP',
            text: selectedText,
            top: event.touches[0]?.clientY || 0,
            left: event.touches[0]?.clientX || 0
          }));
        }, TAP_DELAY);
      } else if (tapCount === 3) {
        window.ReactNativeWebView.postMessage(JSON.stringify({
          type: 'TRIPLE_TAP',
          text: selectedText,
          noteId: noteId,
          colorCode: colorCode,
          top: event.touches[0]?.clientY || 0,
          left: event.touches[0]?.clientX || 0
        }));
        tapCount = 0;
      }
  });
</script>
