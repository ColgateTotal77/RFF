<script>
  window.log = (message, type = 'info') => {
    window.ReactNativeWebView && window.ReactNativeWebView.postMessage(JSON.stringify({
      type: 'LOG', logType: type, message: message
    }));
  }

  document.addEventListener("DOMContentLoaded", () => {
    window.isFetching = false;
    const config = window.BookConfig || {};

    const currentFont = config.fontFamily || "sans-serif";
    const currentFontSize = config.fontSize || 16;

    document.documentElement.style.setProperty('--book-font-family', currentFont);
    document.documentElement.style.setProperty('--book-font-size', `${currentFontSize}px`);
    window.log('DOMContentLoaded: font=' + currentFont + ', size=' + currentFontSize + 'px');
  });

  document.addEventListener('contextmenu', (event) => {
    event.preventDefault();
  });

  window.setFontSize = (size) => {
    window.log('setFontSize: ' + size);
    document.body.style.fontSize = size + 'px';
  };
  window.setFontFamily = (family) => {
    window.log('setFontFamily: ' + family);
    document.body.style.fontFamily = family;
  };


  let selectionRafId = null;
  let lastSelectionText = '';
  document.addEventListener('selectionchange', () => {
    if (selectionRafId) cancelAnimationFrame(selectionRafId);

    selectionRafId = requestAnimationFrame(() => {
      selectionRafId = null;
      const selection = window.getSelection();
      const selectedText = selection.toString().trim();

      if (selectedText === lastSelectionText) return;
      lastSelectionText = selectedText;

      if (selectedText.length > 0) {
        const range = selection.getRangeAt(0);
        const rect = range.getBoundingClientRect();
        if (rect.width === 0 || rect.height === 0) return;
        const menuX = rect.left + rect.width;
        const menuY = rect.top - 60;
        const commonAncestor = range.commonAncestorContainer;

        let noteIds = null;
        let colorCode = null;

        const highlightedElement = commonAncestor.nodeType === Node.TEXT_NODE
          ? commonAncestor.parentElement
          : commonAncestor;

        if (highlightedElement && highlightedElement.classList.contains('anki-word')) {
          noteIds = highlightedElement.getAttribute('data-note-ids');
          colorCode = highlightedElement.getAttribute('data-flag');
        }

        window.ReactNativeWebView.postMessage(JSON.stringify({
          type: 'TEXT_SELECTED',
          text: selectedText,
          top: menuY,
          left: menuX,
          noteIds: noteIds ? noteIds : null,
          colorCode: colorCode ? colorCode : null
        }));

        window.log('TEXT_SELECTED: "' + selectedText.substring(0, 20) + (selectedText.length > 20 ? '...' : '') + '"');
      } else {
        window.ReactNativeWebView.postMessage(JSON.stringify({
          type: 'SELECTION_CLEARED'
        }));
        lastSelectionText = '';
      }
    });
  });

  let tapCount = 0;
  let tapTimer = null;
  let lastTapText = '';
  const TAP_DELAY = 230;
  document.addEventListener('touchend', (event) => {
    const range = document.caretRangeFromPoint(event.changedTouches[0].clientX, event.changedTouches[0].clientY);
    let selectedText = '';
    let noteIds = null;
    let colorCode = null;

    if (range && range.startContainer.nodeType === Node.TEXT_NODE) {
      const text = range.startContainer.textContent;
      const offset = range.startOffset;

      const commonAncestor = range.commonAncestorContainer;
      const highlightedElement = commonAncestor.nodeType === Node.TEXT_NODE
        ? commonAncestor.parentElement
        : commonAncestor;

      if (highlightedElement && highlightedElement.classList.contains('anki-word')) {
        noteIds = highlightedElement.getAttribute('data-note-ids');
        colorCode = highlightedElement.getAttribute('data-flag');
      }

      const start = text.lastIndexOf(' ', offset - 1) + 1;
      const end = text.indexOf(' ', offset);
      selectedText = text.substring(start, end === -1 ? text.length : end).trim();
    }

    if (!selectedText) return;
      if (tapTimer) {
        clearTimeout(tapTimer);
      }

      tapCount++;

      if (selectedText !== lastTapText) {
        tapCount = 1;
        lastTapText = selectedText;
      }

    window.log('TAP: word="' + selectedText + '", count=' + tapCount);

    if (tapCount === 1) {
        tapTimer = setTimeout(() => {
          if (tapCount === 1 && lastSelectionText) {
            window.ReactNativeWebView.postMessage(JSON.stringify({
              type: 'SELECTION_CLEARED'
            }));
            lastSelectionText = '';
          }
          tapCount = 0;
        }, TAP_DELAY);
      } else if (tapCount === 2) {
        tapTimer = setTimeout(() => {
          tapCount = 0;
          window.ReactNativeWebView.postMessage(JSON.stringify({
            type: 'DOUBLE_TAP',
            text: selectedText,
          }));
        }, TAP_DELAY);
      } else if (tapCount === 3) {
        window.ReactNativeWebView.postMessage(JSON.stringify({
          type: 'TRIPLE_TAP',
          text: selectedText,
          noteIds: noteIds,
          colorCode: colorCode,
        }));
        tapCount = 0;
      }
  });
</script>
