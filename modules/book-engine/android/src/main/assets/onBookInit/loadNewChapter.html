<script>
  window.loadNewBlock = function(fileUrl, position, fetchIndex, removeIndex) {
    window.log('loadNewBlock: loading block ' + fetchIndex + ' from ' + fileUrl);
    var xhr = new XMLHttpRequest();
    xhr.open('GET', fileUrl, true);
    xhr.onreadystatechange = function() {
      if (xhr.readyState === 4) {
        if (xhr.status === 0 || xhr.status === 200) {
          window.log('loadNewBlock: block ' + fetchIndex + ' loaded successfully');
          var htmlContent = xhr.responseText;

          var container = document.createElement('div');
          container.id = "block-" + fetchIndex;
          container.innerHTML = htmlContent;

          if (position === "top") {
            document.body.insertBefore(container, document.body.firstChild);
          } else {
            document.body.appendChild(container);
          }

          var removeId = removeIndex !== undefined && removeIndex !== null ? removeIndex : null;
          if (removeId !== null) {
            var blockToRemove = document.getElementById("block-" + removeId);
            if (blockToRemove) {
              blockToRemove.remove();
              window.log('loadNewBlock: removed block ' + removeId);
            }
          }

          window.isFetching = false;
        } else {
          window.log('loadNewBlock: XHR failed with status ' + xhr.status, 'error');
          window.isFetching = false;
        }
      }
    };
    xhr.onerror = function() {
      window.log('loadNewBlock: XHR network error for ' + fileUrl, 'error');
      window.isFetching = false;
    };
    xhr.send();
  };
</script>
