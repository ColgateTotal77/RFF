<style>
  :root {
    --book-font-size: 16px;
    --book-font-family: Georgia, serif;
    --book-bg-color: #ffffff;
    --book-text-color: #000000;
    --book-selection-bg: rgba(100, 150, 255, 0.4);
  }

  [data-theme="dark"] {
    --book-bg-color: #121212;
    --book-text-color: #e0e0e0;
    --book-selection-bg: rgba(100, 150, 255, 0.6);
  }

  body {
    background-color: var(--book-bg-color) !important;
    color: var(--book-text-color) !important;
    font-size: var(--book-font-size) !important;
    font-family: var(--book-font-family), Georgia, serif !important;
    padding: 20px !important;
    margin: 0 !important;
    text-align: justify !important;
    text-align-last: left !important;
    hyphens: auto !important;
    overflow-x: hidden !important;
    touch-action: pan-y !important;
    -webkit-tap-highlight-color: transparent !important;
  }

  body div, body p, body section, body article, body span, body img {
    padding-left: 0 !important;
    padding-right: 0 !important;
    margin-left: 0 !important;
    margin-right: 0 !important;
    max-width: 100% !important;
    box-sizing: border-box !important;
  }

  img {
    display: block !important;
    height: auto !important;
    max-width: 100% !important;
    margin: 10px 0 !important;
    object-fit: contain !important;
  }

  div[data-last-block-of-chapter="true"] {
    min-height: 100vh;
  }

  ::selection {
    background: var(--book-selection-bg);
  }

  .anki-word[data-flag]:not([data-flag="0"]) {
    position: relative;
  }

  .anki-word[data-flag]:not([data-flag="0"])::after {
    content: '';
    position: absolute;
    top: -3px;
    right: -3px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }

  .anki-word[data-flag="1"]::after { background-color: #ff5252; }
  .anki-word[data-flag="2"]::after { background-color: #ff9800; }
  .anki-word[data-flag="3"]::after { background-color: #4caf50; }
  .anki-word[data-flag="4"]::after { background-color: #2196f3; }
  .anki-word[data-flag="5"]::after { background-color: #e91e63; }
  .anki-word[data-flag="6"]::after { background-color: #00bcd4; }
  .anki-word[data-flag="7"]::after { background-color: #9c27b0; }
  .anki-word[data-flag="8"]::after { background-color: #607d8b; }
</style>
