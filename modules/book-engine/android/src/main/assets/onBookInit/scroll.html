<script>
  window.addEventListener('load', function() {
    const config = window.BookConfig || {};
    const targetBlockIndex = config.targetBlockIndex || 0;
    const scrollPosition = config.scrollPosition || 0;

    var targetBlock = null;
    if(targetBlockIndex >= 0) {
      targetBlock = document.getElementById('block-' + targetBlockIndex);
    }

    if (targetBlock) {
      requestAnimationFrame(() => {
        targetBlock.scrollIntoView({ behavior: 'instant', block: 'start' });
        window.log('scroll: jumping to block ' + targetBlockIndex);
      });
    } else {
      requestAnimationFrame(() => {
        window.scrollTo(0, scrollPosition);
        window.log('scroll: scrolled to absolute position ' + scrollPosition);
      });
    }

    setTimeout(function() {
      window.ReactNativeWebView.postMessage(JSON.stringify({
        type: 'INITIAL_LOAD_COMPLETE',
      }));
      window.log('scroll: initial load complete');
    }, 0);
  });

  let lastSentTime = 0;
  let ticking = false;

  function updateScrollPosition() {
    const blocks = document.querySelectorAll('div[id^="block-"]');
    if (blocks.length === 0) return;

    let currentBlockIndex = 0;
    let currentRect;

    for (let i = 0; i < blocks.length; i++) {
      currentRect = blocks[i].getBoundingClientRect();
      if (currentRect.top <= 0 && currentRect.bottom > 0) {
        currentBlockIndex = i;
        break;
      } else if (currentRect.top > 0) {
        break;
      }
    }

    const currentBlockScrollPercent = Math.abs(Math.min(0, currentRect.top)) / blocks[currentBlockIndex].offsetHeight;
    const currentBlockId = blocks[currentBlockIndex].id;
    const actualBlockIndex = parseInt(currentBlockId.replace('block-', ''));

    window.ReactNativeWebView.postMessage(JSON.stringify({
      type: 'SCROLL_POSITION_CHANGED',
      currentBlock: actualBlockIndex,
      scrollPosition: window.scrollY,
      currentBlockScrollPercent: currentBlockScrollPercent,
    }));
  }

  window.addEventListener('scroll', () => {
    if (window.isFetching) return;

    if (!ticking) {
      ticking = true;

      window.requestAnimationFrame(() => {
        const scrollY = window.scrollY;
        const bottomY = scrollY + window.innerHeight;
        const documentHeight = document.documentElement.scrollHeight;
        const blocks = document.querySelectorAll('div[id^="block-"]');

        if (blocks.length > 0 && documentHeight > window.innerHeight) {
          const firstBlockHeight = blocks[0].offsetHeight;
          const lastBlockHeight = blocks[blocks.length - 1].offsetHeight;

          if (scrollY < (firstBlockHeight * 0.45)) {
            window.isFetching = true;
            window.log('scroll: TOP_REACHED triggered');
            window.ReactNativeWebView.postMessage(JSON.stringify({ type: 'TOP_REACHED' }));
          }
          if (bottomY > (documentHeight - (lastBlockHeight * 0.45))) {
            window.isFetching = true;
            window.log('scroll: END_REACHED triggered');
            window.ReactNativeWebView.postMessage(JSON.stringify({ type: 'END_REACHED' }));
          }
        }

        ticking = false;
      });
    }

    const now = Date.now();
    if (now - lastSentTime > 300) {
      lastSentTime = now;
      lastScrollY = window.scrollY;
      updateScrollPosition();
    }
  }, { passive: true });

  window.scrollToBlock = function(blockIndex) {
    var targetId = 'block-' + blockIndex;
    var target = document.getElementById(targetId);

    if (target) {
      window.log('scrollToBlock: scrolling to ' + targetId);
      target.scrollIntoView({ behavior: 'instant', block: 'start' });
    } else {
      window.log('scrollToBlock: block not found ' + targetId, 'error');
    }
  };
</script>
